name: Deploy site to server

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one concurrent deployment.
concurrency:
  group: deploy-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Served at the root of its own subdomain, so BASE_PATH is "/".
      - name: Build
        env:
          BASE_PATH: /
          SITE_URL: https://nasa-harness-bench.valstar.dev
        run: pnpm build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "valstar.dev ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDGM9+xE2TN1bTegJpLSTons6YOZF7vaDFy+B345NQ6R" > ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/nasa-harness-bench/dist/"
